name: Deploy

on:
  push:
    branches:
      - ci-test
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma'
        required: true
        default: 'both'
        type: choice
        options:
          - android
          - ios
          - both
      environment:
        description: 'Destino (testing = TestFlight / internal track, production = App Store / production track)'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - production

permissions:
  contents: write

jobs:
  android:
    name: Deploy Android
    if: ${{ github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Decodificar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/upload-keystore.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/upload-keystore.jks" >> $GITHUB_ENV

      - run: flutter pub get

      - name: Definir build number
        run: echo "BUILD_NUMBER=$(( ${{ github.run_number }} + 1000 ))" >> $GITHUB_ENV

      - name: Deploy para o Play Store
        env:
          DEPLOY_ENV: ${{ github.event_name == 'push' && 'testing' || inputs.environment }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: bundle exec fastlane android deploy

  ios:
    name: Deploy iOS
    if: ${{ github.event_name == 'push' || inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - run: flutter pub get

      - name: Definir build number
        run: echo "BUILD_NUMBER=$(( ${{ github.run_number }} + 1000 ))" >> $GITHUB_ENV

      - run: cd ios && pod install --repo-update

      - name: Configurar keychain para assinatura
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="temporary"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          echo "MATCH_KEYCHAIN_NAME=$KEYCHAIN_NAME" >> $GITHUB_ENV
          echo "MATCH_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Deploy para App Store / TestFlight
        env:
          DEPLOY_ENV: ${{ github.event_name == 'push' && 'testing' || inputs.environment }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: bundle exec fastlane ios deploy

      - name: Limpar keychain
        if: always()
        run: security delete-keychain "build.keychain" 2>/dev/null || true

  promote:
    name: Promover ci-test para master
    needs: [android, ios]
    if: ${{ github.event_name == 'push' && success() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge ci-test → master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          git merge origin/ci-test --no-ff -m "Promover ci-test para master após deploy bem-sucedido"
          git push origin master
